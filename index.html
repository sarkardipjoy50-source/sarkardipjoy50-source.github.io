<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarkar Dipjoy - Bio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #020617, #1e1b4b, #2e1065, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            padding: 40px 25px;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            text-align: center;
            max-width: 360px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .profile-icon {
            font-size: 50px;
            width: 110px;
            height: 110px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(165, 180, 252, 0.4);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.03); }
        }
        h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; letter-spacing: 1.5px; }
        p.username { font-size: 14px; color: #94a3b8; margin-bottom: 30px; }
        .bio-section {
            text-align: left;
            background: rgba(0, 0, 0, 0.25);
            padding: 22px;
            border-radius: 20px;
            margin-bottom: 30px;
            font-size: 14px;
            line-height: 1.9;
        }
        .bio-item { display: flex; align-items: center; margin-bottom: 12px; }
        .icon-p { margin-right: 12px; font-size: 18px; background: rgba(255, 255, 255, 0.08); padding: 4px 8px; border-radius: 8px; }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            text-decoration: none;
            padding: 15px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s;
            margin-bottom: 14px;
        }
        .btn:hover { background: #fff; color: #0f172a; transform: translateY(-4px); }
    </style>
</head>
<body>
    <div class="container animate__animated animate__fadeInUp">
        <div class="profile-icon">🪘</div>
        <h1>SARKAR DIPJOY</h1>
        <p class="username">@sarkar_turzo</p>
        <div class="bio-section animate__animated animate__fadeIn animate__delay-1s">
            <div class="bio-item"><span class="icon-p">📰</span> Child Journalist</div>
            <div class="bio-item"><span class="icon-p">🎶</span> Tabla & Ukulele Player</div>
            <div class="bio-item"><span class="icon-p">👨‍🍳</span> Kitchen Experimenter</div>
            <div class="bio-item"><span class="icon-p">🔬</span> Bagerhat Govt High School</div>
            <div class="bio-item"><span class="icon-p">🎂</span> 08.08</div>
        </div>
        <div class="links-container">
            <a href="https://hello.bdnews24.com" class="btn" target="_blank">📰 My Reports on bdnews24</a>
            <a href="https://instagram.com/sarkar_turzo" class="btn" target="_blank">📸 Instagram Profile</a>
        </div>
    </div>
</body>
</html>
