        * {

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;

            justify-content: center;
            align-items: center;

        .container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);

            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            text-align: center;

        }

        .profile-img {
            width: 110px;

            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);

        h1 {

        }

        .subtitle {
            font-size: 0.95rem;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            display: block;
        }

        .link-btn:hover {
            background: #38bdf8;
            color: #0f172a;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4);
        }

        .footer {
            margin-top: 35px;
            font-size: 0.8rem;
            color: #64748b;
        }
