<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarkar Dipjoy | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(to bottom, #a1c4fd, #c2e9fb, #e0f2fe);
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }
        /* Soft Ghibli Clouds Effect */
        body::before, body::after {
            content: "☁️";
            position: absolute;
            font-size: 80px;
            opacity: 0.25;
            animation: cloudMove 20s linear infinite;
        }
        body::before { top: 10%; left: -10%; }
        body::after { bottom: 15%; right: -10%; animation-delay: 10s; direction: reverse; }
        @keyframes cloudMove {
            0% { transform: translateX(0); }
            100% { transform: translateX(120vw); }
        }
        .container {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 25px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 360px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .profile-icon {
            font-size: 50px;
            width: 100px;
            height: 100px;
            background: #fff;
            border: 3px solid #7dd3fc;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        h1 { font-size: 22px; font-weight: 800; color: #0f172a; letter-spacing: 1px; }
        p.username { font-size: 13px; color: #64748b; margin-bottom: 25px; font-weight: 600; }
        .bio-section {
            text-align: left;
            background: rgba(255, 255, 255, 0.6);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            font-size: 14px;
            line-height: 1.8;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .bio-item { display: flex; align-items: center; margin-bottom: 12px; color: #334155; }
        .bio-item:last-child { margin-bottom: 0; }
        .icon-p {
            margin-right: 12px; font-size: 14px; background: #e0f2fe; color: #0369a1;
            width: 30px; height: 30px; border-radius: 8px; display: flex; justify-content: center; align-items: center;
        }
        .links-container { display: flex; flex-direction: column; gap: 12px; }
        .btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: #0284c7; color: #fff; text-decoration: none; padding: 14px;
            border-radius: 12px; font-weight: 600; font-size: 14px; transition: all 0.3s;
        }
        .btn:hover { background: #0369a1; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(2, 132, 199, 0.3); }
    </style>
</head>
<body>
    <div class="container animate__animated animate__fadeInUp">
        <div class="profile-icon">🪘</div>
        <h1>SARKAR DIPJOY</h1>
        <p class="username">@sarkar_turzo</p>
        <div class="bio-section">
            <div class="bio-item"><span class="icon-p"><i class="fa-solid fa-newspaper"></i></span><span>Child Journalist</span></div>
            <div class="bio-item"><span class="icon-p"><i class="fa-solid fa-music"></i></span><span>Tabla & Ukulele Player</span></div>
            <div class="bio-item"><span class="icon-p"><i class="fa-solid fa-utensils"></i></span><span>Kitchen Experimenter</span></div>
            <div class="bio-item"><span class="icon-p"><i class="fa-solid fa-graduation-cap"></i></span><span>Bagerhat Govt High School (Class 9)</span></div>
            <div class="bio-item"><span class="icon-p"><i class="fa-solid fa-cake-candles"></i></span><span>August 08</span></div>
        </div>
        <div class="links-container">
            <a href="https://hello.bdnews24.com" class="btn" target="_blank"> My Reports on bdnews24</a>
            <a href="https://instagram.com/sarkar_turzo" class="btn" target="_blank"> Instagram Profile</a>
        </div>
    </div>
</body>
</html>
