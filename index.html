<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FT2M8RNWPX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];

      gtag('config', 'G-FT2M8RNWPX');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarkar Dipjoy | Artistic Cultural Space</title>
    <!-- Beautiful Icons and Typography -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            background-color: #bfdb38; 
            /* ১ নম্বর ফিচার: সার্কিট ডট প্যাটার্ন ব্যাকগ্রাউন্ড */
            background-image: radial-gradient(#132a13 0.8px, transparent 0.8px);
            background-size: 25px 25px;
            color: #132a13;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
            overflow-x: hidden;
            position: relative;
        }

        /* Subtle Cultural Floating Sparkles in Background */
        .cultural-bg-art {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 1;
        }
        .cultural-bg-art::before, .cultural-bg-art::after {
            content: "🎵 ✨ 🌸 🍃 ✨ 🎶";
            position: absolute;
            font-size: 26px;
            opacity: 0.25;
            animation: floatArt 8s linear infinite;
        }
        .cultural-bg-art::before { left: 8%; top: 15%; animation-delay: 0s; }
        .cultural-bg-art::after { right: 8%; bottom: 15%; animation-delay: 3s; }

        @keyframes floatArt {
            0% { transform: translateY(0) scale(1) rotate(0deg); }
            50% { transform: translateY(-30px) scale(1.1) rotate(180deg); }
            100% { transform: translateY(0) scale(1) rotate(360deg); }
        }

        /* Beautiful Hand-Crafted Premium Card */
        .artistic-card {
            background: #ffffff;
            padding: 45px 28px;
            border-radius: 32px;
            box-shadow: 10px 10px 0px #132a13;
            border: 3.5px solid #132a13;
            text-align: center;
            max-width: 385px;
            width: 100%;
            z-index: 10;
            position: relative;
        }

        /* Music Floating Controller Button */
        .music-controller {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ff6b6b;
            border: 2px solid #132a13;
            box-shadow: 3px 3px 0px #132a13;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 100;
            transition: all 0.2s ease;
        }
        .music-controller:hover {
            transform: scale(1.05) translate(-1px, -1px);
            box-shadow: 4px 4px 0px #132a13;
        }
        .music-controller i {
            color: white;
            font-size: 16px;
        }

        /* The Ultimate Science & Melody Fusion Core Logo */
        .fusion-core {
            width: 110px;
            height: 110px;
            background: #ff6b6b; 
            border-radius: 50%;
            margin: 0 auto 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid #132a13;
            box-shadow: 5px 5px 0px #132a13;
            position: relative;
            animation: gentleBounce 4s ease-in-out infinite;
        }

        @keyframes gentleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .orbit-ring {
            position: absolute;
            width: 90px;
            height: 32px;
            border: 2.5px solid #ffffff;
            border-radius: 50%;
            animation: spinRing 4s linear infinite;
        }

        .melody-bars {
            display: flex;
            gap: 4px;
            align-items: center;
            z-index: 5;
        }
        .m-bar {
            width: 4px;
            background: #ffffff;
            border-radius: 2px;
            animation: pulseBar 1s ease-in-out infinite;
        }
        .m-bar:nth-child(1) { height: 14px; animation-delay: 0.1s; }
        .m-bar:nth-child(2) { height: 32px; animation-delay: 0.3s; }
        .m-bar:nth-child(3) { height: 22px; animation-delay: 0.5s; }

        @keyframes spinRing { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulseBar { 0%, 100% { transform: scaleY(0.5); } 50% { transform: scaleY(1.3); } }

        h1 {
            font-size: 25px;
            font-weight: 900;
            color: #132a13;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        p.username {
            font-size: 13px;
            color: #4f6d7a;
            margin-bottom: 5px; 
            font-weight: 700;
            letter-spacing: 1px;
        }

        .typing-container {
            font-size: 14px;
            font-weight: 800;
            color: #ff6b6b; 
            height: 20px;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Live Digital Clock & Day Widget Style */
        .live-clock-widget {
            background: #b7e4c7;
            border: 2px solid #132a13;
            box-shadow: 3px 3px 0px #132a13;
            border-radius: 12px;
            padding: 6px 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 12.5px;
            font-weight: 800;
            color: #132a13;
            margin-bottom: 25px;
        }
        .live-clock-widget i {
            animation: spinRing 8s linear infinite;
        }

        /* Deep Inspiring Cultural Proverb Box */
        .cultural-proverb {
            background: #fff9db; 
            border: 2.5px solid #132a13;
            padding: 14px 16px;
            margin-bottom: 30px;
            text-align: left;
            border-radius: 14px;
            box-shadow: 4px 4px 0px #132a13;
        }

        .cultural-proverb p {
            font-style: italic;
            font-size: 13.5px;
            line-height: 1.5;
            color: #132a13;
            font-weight: 700;
        }

        /* Color-Burst Multi-Color Information Stack */
        .art-stack {
            text-align: left;
            margin-bottom: 35px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .art-chip {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            border-radius: 16px;
            border: 2.5px solid #132a13;
            box-shadow: 4px 4px 0px #132a13;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .art-stack .art-chip:nth-child(1) { background-color: #a2d2ff; } 
        .art-stack .art-chip:nth-child(2) { background-color: #ffafcc; } 
        .art-stack .art-chip:nth-child(3) { background-color: #ffcc00; } 
        .art-stack .art-chip:nth-child(4) { background-color: #b7e4c7; } 
        .art-stack .art-chip:nth-child(5) { background-color: #cdb4db; } 

        .art-chip:hover {
            transform: translate(-3px, -3px);
            box-shadow: 7px 7px 0px #132a13;
        }

        .chip-icon {
            margin-right: 15px;
            font-size: 16px;
            color: #132a13;
            width: 26px;
            display: flex;
            justify-content: center;
        }

        .chip-label {
            font-size: 14.5px;
            font-weight: 800;
            color: #132a13;
            letter-spacing: 0.2px;
        }

        /* ২ নম্বর ফিচার: ডাইনামিক হ্যাকার কনসোল স্টাইল */
        .hacker-console {
            background: #132a13;
            color: #39ff14; /* নিয়ন গ্রিন */
            font-family: 'Courier New', monospace;
            padding: 12px;
            border-radius: 14px;
            font-size: 11.5px;
            margin-bottom: 25px;
            text-align: left;
            border: 2.5px solid #132a13;
            box-shadow: 4px 4px 0px #ff6b6b;
            height: 80px;
            overflow-y: hidden;
            line-height: 1.5;
        }

        /* Bold High-Contrast Forest Green Action Buttons */
        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .art-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #132a13; 
            color: #bfdb38; 
            text-decoration: none;
            padding: 16px 24px;
            border-radius: 18px;
            font-weight: 800;
            font-size: 15px;
            border: 3.5px solid #132a13;
            box-shadow: 5px 5px 0px #ff6b6b; 
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
            cursor: pointer;
            text-align: left;
        }

        .btn-label-set {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .art-btn i.arrow-click {
            font-size: 13px;
            transition: transform 0.2s;
        }

        .art-btn:hover {
            background: #ffffff;
            color: #132a13;
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0px #132a13;
        }

        .art-btn:hover i.arrow-click {
            transform: translateX(4px) scale(1.1);
        }

        /* Mouse Sparkle Particles Dynamic Styling */
        .sparkle-particle {
            position: fixed;
            pointer-events: none;
            font-size: 14px;
            z-index: 9999;
            animation: explodeParticle 0.8s ease-out forwards;
        }
        @keyframes explodeParticle {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(var(--mx), var(--my)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Cultural Decorative Layer -->
    <div class="cultural-bg-art"></div>

    <!-- Background Hidden Audio Element -->
    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mp3">
    </audio>

    <!-- Main High-Contrast Colorful Card Window -->
    <div class="artistic-card animate__animated animate__jackInTheBox">
        
        <!-- Music Dynamic floating Badge -->
        <div class="music-controller" id="music-toggle" onclick="toggleMusic()">
            <i class="fa-solid fa-music" id="music-icon"></i>
        </div>

        <!-- The Fusion Art Core Logo Component -->
        <div class="fusion-core">
            <div class="orbit-ring"></div>
            <div class="melody-bars">
                <div class="m-bar"></div>
                <div class="m-bar"></div>
                <div class="m-bar"></div>
            </div>
        </div>
        
        <h1>SARKAR DIPJOY</h1>
        <p class="username">@sarkar_turzo</p>

        <!-- টাইপিং ইফেক্টের এলিমেন্ট -->
        <div class="typing-container" id="typing-text"></div>

        <!-- Live Clock & Day Widget Widget (ফিক্স করা আইকন ক্লাস) -->
        <div class="live-clock-widget">
            <i class="fa-solid fa-spinner fa-spin"></i>
            <span id="live-time-display">Loading Time...</span>
        </div>

        <!-- Deep Cultural Quote Proverb -->
        <div class="cultural-proverb">
            <p>"Science dissects the universe; Art weaves it together."</p>
        </div>
        
        <!-- Beautiful Multi-Color Information Grid -->
        <div class="art-stack">
            <div class="art-chip">
                <div class="chip-icon"><i class="fa-solid fa-atom"></i></div>
                <div class="chip-label">Science Student</div>
            </div>
            <div class="art-chip">
                <div class="chip-icon"><i class="fa-solid fa-feather-pointed"></i></div>
                <div class="chip-text chip-label">Child Journalist</div>
            </div>
            <div class="art-chip">
                <div class="chip-icon"><i class="fa-solid fa-guitar"></i></div>
                <div class="chip-label">Tabla & Ukulele Player</div>
            </div>
            <div class="art-chip">
                <div class="chip-icon"><i class="fa-solid fa-graduation-cap"></i></div>
                <div class="chip-label">Bagerhat Govt High School (Class 9)</div>
            </div>
            <div class="art-chip">
                <div class="chip-icon"><i class="fa-solid fa-cake-candles"></i></div>
                <div class="chip-label">August 08</div>
            </div>
        </div>

        <!-- ২ নম্বর ফিচার: ডাইনামিক হ্যাকার কনসোল বক্স -->
        <div class="hacker-console" id="console-log">
            &gt;_ Initializing Sarkar_OS...<br>
            &gt;_ Core Temp: 37°C | Status: Online
        </div>

        <!-- Heavy Duty High-Contrast Navigation Stack -->
        <div class="links-grid">
            <button onclick="openMyStories()" class="art-btn">
                <span class="btn-label-set">
                    <i class="fa-solid fa-book-open"></i>
                    My Stories on bdnews24
                </span>
                <i class="fa-solid fa-chevron-right arrow-click"></i>
            </button>
            
            <a href="https://instagram.com/sarkar_turzo" class="art-btn" target="_blank">
                <span class="btn-label-set">
                    <i class="fa-brands fa-instagram"></i>
                    Instagram Profile
                </span>
                <i class="fa-solid fa-chevron-right arrow-click"></i>
            </a>
        </div>
    </div>

    <!-- জাভাস্ক্রিপ্ট সেকশন -->
    <script>
        // এক ক্লিকে দুটি নিউজ একসাথে ওপেন করার ফাংশন
        function openMyStories() {
            window.open("https://hello.bdnews24.com/hello-video/c34c93431d78", "_blank");
            window.open("https://hello.bdnews24.com/hello-video/143bd4dd7ea9", "_blank");
        }

        // অটো-টাইপিং ইফেক্টের ফাংশন
        const words = ["Science Student", "Child Journalist", "Tabla & Ukulele Player"];
        let wordIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        const typingElement = document.getElementById("typing-text");

        function type() {
            const currentWord = words[wordIndex];
            
            if (isDeleting) {
                typingElement.textContent = currentWord.substring(0, charIndex - 1);
                charIndex--;
            } else {
                typingElement.textContent = currentWord.substring(0, charIndex + 1);
                charIndex++;
            }

            typingElement.innerHTML += '<span style="animation: blink 0.7s infinite;">|</span>';

            let typeSpeed = isDeleting ? 50 : 120;

            if (!isDeleting && charIndex === currentWord.length) {
                typeSpeed = 1500; 
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                wordIndex = (wordIndex + 1) % words.length;
                typeSpeed = 500; 
            }

            setTimeout(type, typeSpeed);
        }

        const style = document.createElement('style');
        style.innerHTML = '@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }';
        document.head.appendChild(style);

        // মিউজিক কন্ট্রোলার ফাংশন
        const music = document.getElementById("bg-music");
        const musicIcon = document.getElementById("music-icon");

        function toggleMusic() {
            if (music.paused) {
                music.play();
                musicIcon.className = "fa-solid fa-pause";
                document.getElementById("music-toggle").style.animation = "spinRing 4s linear infinite";
            } else {
                music.pause();
                musicIcon.className = "fa-solid fa-music";
                document.getElementById("music-toggle").style.animation = "none";
            }
        }

        // রিয়েল-টাইম লাইভ ক্লক ও দিন ফাংশন
        function updateLiveTime() {
            const now = new Date();
            const options = { weekday: 'short', month: 'short', day: 'numeric' };
            const dateString = now.toLocaleDateString('en-US', options);
            const timeString = now.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            document.getElementById("live-time-display").textContent = `${dateString} | ${timeString}`;
        }
        setInterval(updateLiveTime, 1000);

        // হ্যাকার কনসোল লাইভ টেক্সট জেনারেটর ফাংশন
        const consoleMessages = [
            "&gt;_ Loading creative neural networks...",
            "&gt;_ Syncing background melody logs...",
            "&gt;_ Connecting to Bagerhat network node...",
            "&gt;_ Fetching journalist reports from bdnews24...",
            "&gt;_ Tuning Tabla frequencies: 440Hz...",
            "&gt;_ Amplifying physics core data (10W)...",
            "&gt;_ System Status: Fully Optimized & Alpha."
        ];
        let msgIndex = 0;
        const consoleElement = document.getElementById("console-log");

        function updateConsole() {
            consoleElement.innerHTML += "<br>" + consoleMessages[msgIndex];
            consoleElement.scrollTop = consoleElement.scrollHeight;
            msgIndex = (msgIndex + 1) % consoleMessages.length;
        }
        setInterval(updateConsole, 3500);

        // মাউস কার্সরের পেছনে ম্যাজিক স্পার্কল ইফেক্ট
        document.addEventListener('mousemove', function(e) {
            if (Math.random() > 0.12) return; 
            createSparkle(e.clientX, e.clientY);
        });

        document.addEventListener('touchmove', function(e) {
            if (Math.random() > 0.12) return;
            createSparkle(e.touches[0].clientX, e.touches[0].clientY);
        });

        function createSparkle(x, y) {
            const particle = document.createElement('div');
            particle.className = 'sparkle-particle';
            
            const shapes = ['✨', '🎵', '🎶', '✨', '🌸'];
            particle.textContent = shapes[Math.floor(Math.random() * shapes.length)];
            
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            
            const mx = (Math.random() - 0.5) * 80 + 'px';
            const my = (Math.random() - 0.5) * 80 + 'px';
            particle.style.setProperty('--mx', mx);
            particle.style.setProperty('--my', my);
            
            document.body.appendChild(particle);
            
            setTimeout(() => {
                particle.remove();
            }, 800);
        }

        // পেজ লোড হলে রান হবে
        document.addEventListener("DOMContentLoaded", function() {
            setTimeout(type, 500);
            updateLiveTime();
        });
    </script>

</body>
</html>
