<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarkar Dipjoy | Science, Media & Arts</title>
    <!-- External Dependencies for Aesthetics -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            /* Aurora Mist Background - Ultra Premium Light/Sophisticated Aesthetic */
            background: radial-gradient(circle at 20% 20%, #eef2f3 0%, #e4e7eb 50%, #d5dbdb 100%);
            color: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Glow behind the container */
        body::before {
            content: "";
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.08) 0%, rgba(168, 85, 247, 0.05) 70%, transparent 100%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        .master-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 50px 35px;
            border-radius: 36px;
            box-shadow: 0 30px 60px rgba(15, 23, 42, 0.04), 
                        0 2px 8px rgba(15, 23, 42, 0.02),
                        inset 0 1px 0px rgba(255, 255, 255, 0.6);
            text-align: center;
            max-width: 390px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.6);
            z-index: 1;
            position: relative;
        }

        /* The Fusion Core Avatar (Science meets Art - No Face) */
        .avatar-container {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            border-radius: 50%;
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 35px rgba(15, 23, 42, 0.15);
            position: relative;
        }

        /* Atomic Quantum Orbit Ring */
        .quantum-ring {
            position: absolute;
            width: 90px;
            height: 35px;
            border: 1.5px solid rgba(14, 165, 233, 0.5);
            border-radius: 50%;
            animation: rotateQuantum 5s linear infinite;
        }
        .quantum-ring:nth-child(2) {
            animation: rotateQuantum 5s linear infinite reverse;
            transform: rotate(60deg);
            border-color: rgba(168, 85, 247, 0.5);
        }

        /* Pulse Waves representing Music */
        .audio-bars {
            display: flex;
            gap: 4px;
            z-index: 2;
            align-items: center;
        }
        .bar {
            width: 3.5px;
            background: #ffffff;
            border-radius: 2px;
            animation: soundWave 1.2s ease-in-out infinite;
        }
        .bar:nth-child(1) { height: 18px; animation-delay: 0.1s; }
        .bar:nth-child(2) { height: 28px; animation-delay: 0.3s; }
        .bar:nth-child(3) { height: 38px; animation-delay: 0.5s; }
        .bar:nth-child(4) { height: 24px; animation-delay: 0.2s; }

        @keyframes rotateQuantum {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes soundWave {
            0%, 100% { transform: scaleY(0.4); opacity: 0.7; }
            50% { transform: scaleY(1); opacity: 1; }
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 6px;
            letter-spacing: 2px;
            color: #0f172a;
            text-transform: uppercase;
        }

        p.username {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 35px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* High-End Structured Bio Showcase */
        .showcase-box {
            text-align: left;
            background: rgba(255, 255, 255, 0.4);
            padding: 24px;
            border-radius: 24px;
            margin-bottom: 35px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
        }

        .showcase-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .showcase-item:last-child { margin-bottom: 0; }

        .badge-icon {
            margin-right: 16px;
            font-size: 14px;
            background: #ffffff;
            color: #334155;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.03);
            border: 1px solid rgba(15, 23, 42, 0.05);
        }

        .showcase-text {
            font-size: 14.5px;
            font-weight: 600;
            color: #475569;
            letter-spacing: 0.2px;
        }

        /* Fluid Premium Buttons */
        .action-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #0f172a;
            color: #ffffff;
            text-decoration: none;
            padding: 16px 24px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 14.5px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 1px solid #0f172a;
        }

        .btn-core {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .action-btn i.arrow-indicator {
            font-size: 11px;
            opacity: 0.4;
            transition: transform 0.3s;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.95);
            color: #0f172a;
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(15, 23, 42, 0.06);
            border-color: rgba(15, 23, 42, 0.1);
        }

        .action-btn:hover i.arrow-indicator {
            transform: translateX(4px);
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="master-card animate__animated animate__fadeInUp">
        
        <!-- Science + Music Core Concept Graphic Wrapper -->
        <div class="avatar-container">
            <div class="quantum-ring"></div>
            <div class="quantum-ring"></div>
            <div class="audio-bars">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>
        
        <h1>SARKAR DIPJOY</h1>
        <p class="username">@sarkar_turzo</p>
        
        <!-- Premium Bio Grid Info -->
        <div class="showcase-box animate__animated animate__fadeIn animate__delay-1s">
            <div class="showcase-item">
                <div class="badge-icon"><i class="fa-solid fa-flask-vial"></i></div>
                <div class="showcase-text">Science Student</div>
            </div>
            <div class="showcase-item">
                <div class="badge-icon"><i class="fa-solid fa-microphone-lines"></i></div>
                <div class="showcase-text">Child Journalist</div>
            </div>
            <div class="showcase-item">
                <div class="badge-icon"><i class="fa-solid fa-music"></i></div>
                <div class="showcase-text">Tabla & Ukulele Player</div>
            </div>
            <div class="showcase-item">
                <div class="badge-icon"><i class="fa-solid fa-school"></i></div>
                <div class="showcase-text">Bagerhat Govt High School (Class 9)</div>
            </div>
            <div class="showcase-item">
                <div class="badge-icon"><i class="fa-solid fa-calendar-day"></i></div>
                <div class="showcase-text">August 08</div>
            </div>
        </div>

        <!-- Premium Navigation Links -->
        <div class="action-container">
            <a href="https://hello.bdnews24.com" class="action-btn" target="_blank">
                <span class="btn-core">
                    <i class="fa-solid fa-feather"></i>
                    My Reports on bdnews24
                </span>
                <i class="fa-solid fa-chevron-right arrow-indicator"></i>
            </a>
            <a href="https://instagram.com/sarkar_turzo" class="action-btn" target="_blank">
                <span class="btn-core">
                    <i class="fa-brands fa-instagram"></i>
                    Instagram Profile
                </span>
                <i class="fa-solid fa-chevron-right arrow-indicator"></i>
            </a>
        </div>
    </div>

</body>
</html>
