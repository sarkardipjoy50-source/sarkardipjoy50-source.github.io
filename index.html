<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarkar Dipjoy | Magic Space</title>
    <!-- Beautiful Icons and Animations -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            /* Ultra-Cute Soft Pastel Dream Background */
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1, #ffb3c6, #e0f2fe, #f0fdf4);
            background-size: 400% 400%;
            animation: pastelFlow 12s ease infinite;
            color: #4f46e5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes pastelFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Sparkles & Hearts Background Animation */
        .sparkle-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 0;
        }
        .sparkle-bg::before, .sparkle-bg::after {
            content: "✨ 💕 🌸 ✨ 🎵";
            position: absolute;
            font-size: 24px;
            opacity: 0.3;
            animation: floatSparkles 8s linear infinite;
        }
        .sparkle-bg::before { left: 10%; top: 20%; animation-delay: 1s; }
        .sparkle-bg::after { right: 10%; bottom: 20%; animation-delay: 4s; }

        @keyframes floatSparkles {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-100px) scale(1.2) rotate(360deg); opacity: 0; }
        }

        /* Premium Glass Card with Soft Pink Border */
        .cute-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 45px 30px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(255, 179, 198, 0.4), 
                        inset 0 2px 4px rgba(255, 255, 255, 0.8);
            text-align: center;
            max-width: 375px;
            width: 100%;
            border: 2px solid rgba(255, 182, 193, 0.5);
            z-index: 1;
            position: relative;
            animation: cardEntrance 1s ease-out;
        }

        /* Cute Science & Art Hybrid Graphic (No Face) */
        .magic-core {
            width: 115px;
            height: 115px;
            background: linear-gradient(135deg, #ff85a1, #ffb3c6);
            border-radius: 50%;
            margin: 0 auto 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 12px 25px rgba(255, 133, 161, 0.4);
            position: relative;
            animation: gentleFloat 4s ease-in-out infinite;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Magical Orbit Ring (Science) */
        .magic-orbit {
            position: absolute;
            width: 95px;
            height: 35px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: spinOrbit 4s linear infinite;
        }
        .magic-orbit::after {
            content: "✨";
            position: absolute;
            top: -10px; left: 50%;
            font-size: 14px;
        }

        /* Sweet Bouncing Music Waves (Arts) */
        .cute-waves {
            display: flex;
            gap: 4px;
            align-items: center;
            z-index: 2;
        }
        .cute-bar {
            width: 4px;
            background: #ffffff;
            border-radius: 2px;
            animation: cutePulse 1s ease-in-out infinite;
        }
        .cute-bar:nth-child(1) { height: 16px; animation-delay: 0.1s; }
        .cute-bar:nth-child(2) { height: 32px; animation-delay: 0.3s; }
        .cute-bar:nth-child(3) { height: 22px; animation-delay: 0.5s; }

        @keyframes spinOrbit {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes cutePulse {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1.3); }
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            color: #4a4e69;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        p.username {
            font-size: 13px;
            color: #9a8c98;
            margin-bottom: 30px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* Beautiful and Cozy Showcase Box */
        .showcase-box {
            text-align: left;
            background: rgba(255, 255, 255, 0.5);
            padding: 24px;
            border-radius: 24px;
            margin-bottom: 35px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 20px rgba(255, 179, 198, 0.05);
        }

        .showcase-item {
            display: flex;
            align-items: center;
            margin-bottom: 14px;
            transition: transform 0.2s;
        }
        .showcase-item:hover { transform: translateX(3px); }
        .showcase-item:last-child { margin-bottom: 0; }

        .cute-badge {
            margin-right: 14px;
            font-size: 15px;
            background: #fff0f3;
            color: #ff4d6d;
            width: 34px;
            height: 34px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #ffccd5;
            box-shadow: 0 4px 8px rgba(255, 77, 109, 0.05);
        }

        .showcase-text {
            font-size: 14px;
            font-weight: 600;
            color: #5c5a76;
        }

        /* Bouncy Bubble Buttons */
        .action-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ff758f;
            color: #ffffff;
            text-decoration: none;
            padding: 16px 24px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14.5px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #ff758f;
            box-shadow: 0 8px 20px rgba(255, 117, 143, 0.2);
        }

        .btn-core {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .action-btn i.heart-icon {
            font-size: 12px;
            opacity: 0.6;
            transition: transform 0.3s;
        }

        .action-btn:hover {
            background: #ffffff;
            color: #ff758f;
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 24px rgba(255, 117, 143, 0.3);
            border-color: #ff85a1;
        }

        .action-btn:hover i.heart-icon {
            transform: scale(1.4);
            color: #ff4d6d;
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="sparkle-bg"></div>

    <div class="cute-card animate__animated animate__bounceIn">
        
        <!-- The Magical Science + Art Hybrid Core -->
        <div class="magic-core">
            <div class="magic-orbit"></div>
            <div class="cute-waves">
                <div class="cute-bar"></div>
                <div class="cute-bar"></div>
                <div class="cute-bar"></div>
            </div>
        </div>
        
        <h1>SARKAR DIPJOY</h1>
        <p class="username">@sarkar_turzo</p>
        
        <!-- Beautiful Cozy Grid Information -->
        <div class="showcase-box">
            <div class="showcase-item">
                <div class="cute-badge"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
                <div class="showcase-text">Passionate Science Student</div>
            </div>
            <div class="showcase-item">
                <div class="cute-badge"><i class="fa-solid fa-feather-pointed"></i></div>
                <div class="showcase-text">Inspiring Child Journalist</div>
            </div>
            <div class="showcase-item">
                <div class="cute-badge"><i class="fa-solid fa-heart-pulse"></i></div>
                <div class="showcase-text">Tabla & Ukulele Player</div>
            </div>
            <div class="showcase-item">
                <div class="cute-badge"><i class="fa-solid fa-graduation-cap"></i></div>
                <div class="showcase-text">Bagerhat Govt High School (Class 9)</div>
            </div>
            <div class="showcase-item">
                <div class="cute-badge"><i class="fa-solid fa-cake-candles"></i></div>
                <div class="showcase-text">Sweet Birthday • August 08</div>
            </div>
        </div>

        <!-- Premium Bouncy Navigation Links -->
        <div class="action-container">
            <a href="https://hello.bdnews24.com" class="action-btn" target="_blank">
                <span class="btn-core">
                    <i class="fa-solid fa-book-open"></i>
                    Read My Stories on bdnews24
                </span>
                <i class="fa-solid fa-heart heart-icon"></i>
            </a>
            <a href="https://instagram.com/sarkar_turzo" class="action-btn" target="_blank">
                <span class="btn-core">
                    <i class="fa-brands fa-instagram"></i>
                    Catch Me On Instagram
                </span>
                <i class="fa-solid fa-heart heart-icon"></i>
            </a>
        </div>
    </div>

</body>
                    </html>
