<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarkar Dipjoy | Premium Bright Space</title>
    <!-- Modern Dynamic CSS Libraries -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #f4f7f6;
            color: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 25px;
            overflow-x: hidden;
            position: relative;
        }

        /* 1. Bright Liquid Aurora Kinetic Background (উজ্জ্বল ও প্রিমিয়াম রঙের মেলা) */
        .bright-aurora-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            background: linear-gradient(135deg, #e0f2fe, #f0fdf4, #fef9c3);
        }

        .bright-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.65;
            animation: orbMove 10s infinite alternate ease-in-out;
        }

        .orb-1 { width: 450px; height: 450px; background: #38bdf8; top: -10%; left: -10%; }
        .orb-2 { width: 500px; height: 500px; background: #818cf8; bottom: -20%; right: -10%; animation-delay: 2s; }
        .orb-3 { width: 350px; height: 350px; background: #34d399; top: 30%; left: 40%; animation-delay: 4s; }

        @keyframes orbMove {
            0% { transform: scale(1) translate(0, 0) rotate(0deg); }
            50% { transform: scale(1.2) translate(40px, -30px) rotate(180deg); }
            100% { transform: scale(0.9) translate(-20px, 40px) rotate(360deg); }
        }

        /* 2. Premium White-Gold Glassmorphism Container */
        .bright-container {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 50px 35px;
            border-radius: 36px;
            box-shadow: 0 20px 50px rgba(14, 165, 233, 0.15), 
                        inset 0 1px 2px rgba(255, 255, 255, 0.6);
            text-align: center;
            max-width: 400px;
            width: 100%;
            position: relative;
            z-index: 10;
            overflow: hidden;
            /* Premium gradient glowing border */
            border: 2px solid transparent;
            background-image: linear-gradient(rgba(255, 255, 255, 0.75), rgba(255, 255, 255, 0.75)), 
                              linear-gradient(135deg, #38bdf8, #818cf8, #34d399);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            animation: containerGlow 6s infinite alternate;
        }

        @keyframes containerGlow {
            0% { box-shadow: 0 20px 40px rgba(56, 189, 248, 0.15); }
            100% { box-shadow: 0 20px 40px rgba(52, 211, 153, 0.25); }
        }

        /* 3. Quantum-Audio Interactive Bright Core */
        .quantum-graphic {
            width: 125px;
            height: 125px;
            background: linear-gradient(135deg, #ffffff, #f1f5f9);
            border-radius: 50%;
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05), inset 0 2px 4px rgba(255, 255, 255, 1);
            border: 1px solid rgba(14, 165, 233, 0.2);
        }

        /* 3D Atomic Orbit Rings (Science) */
        .atom-ring {
            position: absolute;
            width: 100px;
            height: 38px;
            border: 2px solid rgba(56, 189, 248, 0.7);
            border-radius: 50%;
            animation: spinAtomX 4s linear infinite;
            transform-style: preserve-3d;
        }
        .atom-ring:nth-child(2) {
            transform: rotate(60deg);
            border-color: rgba(129, 140, 248, 0.7);
            animation: spinAtomY 5s linear infinite reverse;
        }
        .atom-ring:nth-child(3) {
            transform: rotate(-60deg);
            border-color: rgba(52, 211, 153, 0.7);
            animation: spinAtomZ 6s linear infinite;
        }

        @keyframes spinAtomX { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes spinAtomY { 0% { transform: rotate(60deg) rotateX(0deg); } 100% { transform: rotate(60deg) rotateX(360deg); } }
        @keyframes spinAtomZ { 0% { transform: rotate(-60deg) rotateY(0deg); } 100% { transform: rotate(-60deg) rotateY(360deg); } }

        /* Bright Audio Wave Bars (Music) */
        .kinetic-bars {
            display: flex;
            gap: 4px;
            align-items: center;
            z-index: 5;
        }

        .k-bar {
            width: 4px;
            background: linear-gradient(to top, #818cf8, #38bdf8);
            border-radius: 2px;
            animation: kineticPulse 1s ease-in-out infinite;
        }
        .k-bar:nth-child(1) { height: 15px; animation-delay: 0.1s; }
        .k-bar:nth-child(2) { height: 35px; animation-delay: 0.3s; }
        .k-bar:nth-child(3) { height: 45px; animation-delay: 0.5s; }
        .k-bar:nth-child(4) { height: 25px; animation-delay: 0.2s; }
        .k-bar:nth-child(5) { height: 12px; animation-delay: 0.4s; }

        @keyframes kineticPulse {
            0%, 100% { transform: scaleY(0.4); }
            50% { transform: scaleY(1.2); filter: drop-shadow(0 0 4px #38bdf8); }
        }

        /* Premium Typography */
        h1 {
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 6px;
            letter-spacing: 2px;
            background: linear-gradient(to right, #1e1b4b, #4338ca, #0369a1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        p.username {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 30px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Premium Proverb Banner */
        .proverb-banner {
            background: rgba(255, 255, 255, 0.8);
            border-left: 4px solid #38bdf8;
            padding: 15px 18px;
            margin-bottom: 35px;
            text-align: left;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.06);
            border: 1px solid rgba(14, 165, 233, 0.1);
            border-left: 4px solid #38bdf8;
        }

        .proverb-banner p {
            font-style: italic;
            font-size: 13.5px;
            line-height: 1.6;
            color: #334155;
            font-weight: 600;
        }

        /* Bright Interactive Info Grid */
        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 40px;
            text-align: left;
        }

        .info-chip {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 20px;
            border-radius: 18px;
            border: 1px solid rgba(14, 165, 233, 0.1);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .info-chip:hover {
            transform: translateX(6px) scale(1.02);
            background: #ffffff;
            border-color: #818cf8;
            box-shadow: 0 10px 20px rgba(129, 140, 248, 0.12);
        }

        .chip-icon-wrapper {
            margin-right: 16px;
            font-size: 15px;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            transition: all 0.3s;
        }

        /* Color Icons Setup */
        .info-chip:nth-child(1) .chip-icon-wrapper { color: #06b6d4; background: #ecfeff; border-color: #cffafe; }
        .info-chip:nth-child(2) .chip-icon-wrapper { color: #db2777; background: #fdf2f8; border-color: #fce7f3; }
        .info-chip:nth-child(3) .chip-icon-wrapper { color: #d97706; background: #fffbeb; border-color: #fef3c7; }
        .info-chip:nth-child(4) .chip-icon-wrapper { color: #059669; background: #f0fdf4; border-color: #dcfce7; }
        .info-chip:nth-child(5) .chip-icon-wrapper { color: #7c3aed; background: #f5f3ff; border-color: #ede9fe; }

        .info-chip:hover .chip-icon-wrapper {
            transform: rotate(15deg) scale(1.1);
        }

        .chip-text {
            font-size: 14.5px;
            font-weight: 700;
            color: #334155;
        }

        /* Premium Bright Action Buttons */
        .action-stack {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .launch-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            color: #ffffff;
            text-decoration: none;
            padding: 18px 26px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 20px rgba(56, 189, 248, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .launch-btn:nth-child(2) {
            background: linear-gradient(90deg, #475569, #334155);
            box-shadow: 0 8px 20px rgba(51, 65, 85, 0.2);
        }

        .btn-label-group {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .launch-btn i.arrow-glow {
            font-size: 12px;
            opacity: 0.7;
            transition: transform 0.3s;
        }

        /* Hover Physics */
        .launch-btn:hover {
            transform: translateY(-4px) scale(1.01);
            filter: brightness(1.05);
            color: #ffffff;
        }
        .launch-btn:nth-child(1):hover { box-shadow: 0 12px 25px rgba(129, 140, 248, 0.4); }
        .launch-btn:nth-child(2):hover { box-shadow: 0 12px 25px rgba(51, 65, 85, 0.4); }

        .launch-btn:hover i.arrow-glow {
            transform: translateX(6px) scale(1.2);
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- Liquid Bright Aurora Background Layer -->
    <div class="bright-aurora-bg">
        <div class="bright-orb orb-1"></div>

    <!-- Main White Gold Dashboard Container -->
    <div class="bright-container animate__animated animate__zoomIn">

        <h1>SARKAR DIPJOY</h1>

        <div class="proverb-banner animate__animated animate__fadeIn animate__delay-1s">

        <!-- Action Navigation Stack -->
        <div class="action-stack">
            <a href="https://hello.bdnews24.com" class="launch-btn" target="_blank">

                    <i class="fa-solid fa-newspaper"></i>

                </span>
                <i class="fa-solid fa-circle-arrow-right arrow-glow"></i>
            </a>
            <a href="https://instagram.com/sarkar_turzo" class="launch-btn" target="_blank">
                <span class="btn-label-group">
                    <i class="fa-brands fa-instagram"></i>
                    Connect on Instagram
                </span>
                <i class="fa-solid fa-circle-arrow-right arrow-glow"></i>
            </a>
        </div>
    </div>

</body>
</html>
