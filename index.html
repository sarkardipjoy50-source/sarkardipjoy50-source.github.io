<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarkar Dipjoy | Official Bio</title>
    <!-- Premium Icons and Typo Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            /* Flat, Premium Matte Earth Tone (স্ক্রিনশটের মতো সলিড ও মার্জিত ব্যাকগ্রাউন্ড) */
            background-color: #f3efe6;
            color: #2b3a32;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 25px;
        }

        /* Neo-Brutalism High Contrast Card Design */
        .brutal-card {
            background: #ffffff;
            padding: 45px 30px;
            border-radius: 24px;
            /* Solid Heavy Shadow like modern top-tier portfolios */
            box-shadow: 8px 8px 0px #2b3a32;
            border: 3px solid #2b3a32;
            text-align: center;
            max-width: 380px;
            width: 100%;
            position: relative;
        }

        /* Minimal Graphic Circle (No Face - High Contrast Art) */
        .art-hub {
            width: 105px;
            height: 105px;
            background: #2b3a32;
            border-radius: 50%;
            margin: 0 auto 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid #2b3a32;
            box-shadow: 4px 4px 0px #d4e5d4;
            color: #f3efe6;
            font-size: 32px;
            position: relative;
        }

        .art-hub i {
            position: absolute;
        }
        .art-hub i.fa-flask { transform: translate(-12px, -10px) scale(0.8); color: #a3b899; }
        .art-hub i.fa-music { transform: translate(12px, 10px) scale(0.9); color: #f3efe6; }

        h1 {
            font-size: 24px;
            font-weight: 900;
            color: #2b3a32;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        p.username {
            font-size: 13px;
            color: #6e7e75;
            margin-bottom: 25px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* Deep Inspiring Cultural Proverb Quote Box */
        .proverb-box {
            background: #fcfbfa;
            border-left: 4px solid #2b3a32;
            padding: 14px 16px;
            margin-bottom: 30px;
            text-align: left;
            border-radius: 4px;
            box-shadow: 2px 2px 0px rgba(43, 58, 50, 0.1);
        }

        .proverb-box p {
            font-style: italic;
            font-size: 13px;
            line-height: 1.5;
            color: #44544a;
            font-weight: 600;
        }

        /* Structured Flat Bio Grid */
        .info-stack {
            text-align: left;
            margin-bottom: 35px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .info-tag {
            display: flex;
            align-items: center;
            background: #f8f7f4;
            padding: 14px 18px;
            border-radius: 12px;
            border: 2px solid #2b3a32;
            box-shadow: 3px 3px 0px #2b3a32;
            transition: all 0.2s;
        }

        .info-tag:hover {
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0px #2b3a32;
        }

        .tag-icon {
            margin-right: 15px;
            font-size: 15px;
            color: #2b3a32;
            width: 24px;
            display: flex;
            justify-content: center;
        }

        .tag-text {
            font-size: 14px;
            font-weight: 700;
            color: #2b3a32;
        }

        /* High Contrast Bold Action Buttons */
        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .brutal-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #2b3a32;
            color: #f3efe6;
            text-decoration: none;
            padding: 16px 24px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 14.5px;
            border: 3px solid #2b3a32;
            box-shadow: 4px 4px 0px #92a488;
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-label {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brutal-btn i.arrow-icon {
            font-size: 12px;
            transition: transform 0.2s;
        }

        /* Modern Hover Pressing Effect (বাটন নিচে ডেবে যাওয়ার প্রিমিয়াম মেকানিজম) */
        .brutal-btn:hover {
            background: #f3efe6;
            color: #2b3a32;
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px #2b3a32;
        }

        .brutal-btn:hover i.arrow-icon {
            transform: translateX(3px);
        }
    </style>
</head>
<body>

    <div class="brutal-card">
        
        <!-- Minimalist High-Contrast Graphic Fusion -->
        <div class="art-hub">
            <i class="fa-solid fa-flask"></i>
            <i class="fa-solid fa-music"></i>
        </div>
        
        <h1>SARKAR DIPJOY</h1>
        <p class="username">@sarkar_turzo</p>

        <!-- Deep Cultural Proverb Quote -->
        <div class="proverb-box">
            <p>"Science dissects the universe; Art weaves it together."</p>
        </div>
        
        <!-- Clean High-Contrast Info Grid -->
        <div class="info-stack">
            <div class="info-tag">
                <div class="tag-icon"><i class="fa-solid fa-atom"></i></div>
                <div class="tag-text">Science Student</div>
            </div>
            <div class="info-tag">
                <div class="tag-icon"><i class="fa-solid fa-pen-fancy"></i></div>
                <div class="tag-text">Child Journalist</div>
            </div>
            <div class="info-tag">
                <div class="tag-icon"><i class="fa-solid fa-guitar"></i></div>
                <div class="tag-text">Tabla & Ukulele Player</div>
            </div>
            <div class="info-tag">
                <div class="tag-icon"><i class="fa-solid fa-building-columns"></i></div>
                <div class="tag-text">Bagerhat Govt High School (Class 9)</div>
            </div>
            <div class="info-tag">
                <div class="tag-icon"><i class="fa-solid fa-cake-candles"></i></div>
                <div class="tag-text">August 08</div>
            </div>
        </div>

        <!-- Heavy Duty Flat Navigation Links -->
        <div class="links-stack">
            <a href="https://hello.bdnews24.com" class="brutal-btn" target="_blank">
                <span class="btn-label">
                    <i class="fa-solid fa-newspaper"></i>
                    My Reports on bdnews24
                </span>
                <i class="fa-solid fa-arrow-right arrow-icon"></i>
            </a>
            <a href="https://instagram.com/sarkar_turzo" class="brutal-btn" target="_blank">
                <span class="btn-label">
                    <i class="fa-brands fa-instagram"></i>
                    Instagram Profile
                </span>
                <i class="fa-solid fa-arrow-right arrow-icon"></i>
            </a>
        </div>
    </div>

</body>
</html>
