<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarkar Dipjoy | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Georgia', serif;
            background: #f4ebd0;
            color: #4a3728;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #fcf8f2;
            padding: 40px 30px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(74, 55, 40, 0.15);
            text-align: center;
            max-width: 360px;
            width: 100%;
            border: 2px solid #d5c3aa;
            outline: 1px solid #4a3728;
            outline-offset: -10px;
        }
        .profile-icon {
            font-size: 45px;
            width: 90px;
            height: 90px;
            background: #f4ebd0;
            border: 2px solid #4a3728;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px auto 25px;
        }
        h1 { font-size: 24px; font-weight: 700; color: #2b1f16; letter-spacing: 1px; font-family: 'Georgia', serif; }
        p.username { font-size: 13px; color: #7a624e; margin-bottom: 25px; font-style: italic; }
        .bio-section {
            text-align: left;
            border-top: 1px dashed #d5c3aa;
            border-bottom: 1px dashed #d5c3aa;
            padding: 20px 5px;
            margin-bottom: 30px;
            font-size: 14px;
            line-height: 1.9;
        }
        .bio-item { display: flex; align-items: center; margin-bottom: 12px; }
        .bio-item:last-child { margin-bottom: 0; }
        .icon-p { margin-right: 15px; font-size: 15px; color: #7a624e; }
        .links-container { display: flex; flex-direction: column; gap: 12px; }
        .btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: #4a3728; color: #fcf8f2; text-decoration: none; padding: 14px;
            border-radius: 2px; font-weight: 600; font-size: 14px; transition: all 0.3s;
            border: 1px solid #4a3728;
        }
        .btn:hover { background: #fcf8f2; color: #4a3728; }
    </style>
</head>
<body>
    <div class="container animate__animated animate__fadeIn">
        <div class="profile-icon">🪘</div>
        <h1>SARKAR DIPJOY</h1>
        <p class="username">@sarkar_turzo</p>
        <div class="bio-section">
            <div class="bio-item"><span class="icon-p"><i class="fa-solid fa-newspaper"></i></span><span>Child Journalist</span></div>
            <div class="bio-item"><span class="icon-p"><i class="fa-solid fa-music"></i></span><span>Tabla & Ukulele Player</span></div>
            <div class="bio-item"><span class="icon-p"><i class="fa-solid fa-utensils"></i></span><span>Kitchen Experimenter</span></div>
            <div class="bio-item"><span class="icon-p"><i class="fa-solid fa-graduation-cap"></i></span><span>Bagerhat Govt High School (Class 9)</span></div>
            <div class="bio-item"><span class="icon-p"><i class="fa-solid fa-cake-candles"></i></span><span>August 08</span></div>
        </div>
        <div class="links-container">
            <a href="https://hello.bdnews24.com" class="btn" target="_blank">My Reports on bdnews24</a>
            <a href="https://instagram.com/sarkar_turzo" class="btn" target="_blank">Instagram Profile</a>
        </div>
    </div>
</body>
</html>
