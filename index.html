<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarkar Dipjoy - Bio</title>
    <!-- Animate.css library for cool animations -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #2e1065, #3b0764);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        /* Moving background animation */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 360px;
            width: 100%;
            border: 1px rgba(255, 255, 255, 0.08) solid;
        }
        /* Image hover & floating effect */
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.8);
            margin-bottom: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.5s ease;
            animation: float 3s ease-in-out infinite;
        }
        .profile-img:hover {
            transform: rotate(360deg) scale(1.1);
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        h1 {
            font-size: 22px;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: linear-gradient(to right, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p.subtitle {
            font-size: 14px;
            color: #9CA3AF;
            margin: 0 0 25px 0;
        }
        .bio-list {
            text-align: left;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            font-size: 14.5px;
            line-height: 1.9;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        /* Stylish glowing buttons */
        .btn {
            display: block;
            background: rgba(255, 255, 255, 0.07);
            color: #fff;
            text-decoration: none;
            padding: 14px;
            margin: 14px 0;
            border-radius: 16px;
            font-weight: 600;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn:hover {
            background: #fff;
            color: #1e1b4b;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<div class="container animate__animated animate__fadeInUp">
    <!-- Beautiful Ghibli-style nature anime placeholder image -->
    <img src="https://images.unsplash.com/photo-1578632767115-351597cf2477?w=400" alt="Profile" class="profile-img">
    
    <h1 class="animate__animated animate__zoomIn animate__delay-1s">SARKAR DIPJOY</h1>

    <div class="bio-list animate__animated animate__fadeIn animate__delay-1s">

        • 𝘒𝘪𝘵𝘤𝘩𝘦𝘯 𝘌𝘹𝘱𝘦𝘳𝘪𝘮𝘦𝘯𝘵𝘦𝘳 👨‍🍳<br>
        • 𝘉𝘢𝘨𝘦𝘳𝘩𝘢𝘵 𝘎𝘰𝘷𝘵 𝘏𝘪𝘨ʜ 𝘚𝘤𝘩𝘰𝘰𝘭 (𝘊𝘭𝘢𝘴𝘴 9) 🔬<br>

    <a href="https://instagram.com/sarkar_turzo" class="btn animate__animated animate__fadeInRight animate__delay-1s" target="_blank">📸 Instagram Profile</a>
</div>

</body>
</html>
